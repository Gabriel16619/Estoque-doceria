<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./historico.css">
    <title>Historico Estoque de Doces</title>
</head>
<body>
    <header>
        <div class="escopo"> 
            <div class="logo">
                <img src="../img/Group 4.png" alt="logo">
            </div>

            <div class="user">
                <img src="../img/pessoa.jpeg" alt="Usuarios">
            </div>
        </div>
    </header>
    <div class="botao">
        <button class="voltar" id="btnVoltar">☚ Voltar</button>
    </div>
    <main>
        <!-- Grade onde as caixas de doces deletados irão aparecer -->
        <div id="containerDocesDeletados" class="grade-doces-deletados">
            <!-- Os cards dos doces serão injetaados pelo JavaScript-->
        </div>
    </main>
</body>
</html>
