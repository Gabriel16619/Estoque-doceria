<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Limelight&family=Rubik+Spray+Paint&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <script src="./app.js" defer type="module"></script>
    <title>Site Estoque de Doces</title>
</head>
<body>
    <header>
        <img src="./img/Group 4.png" alt="LOGO">
    </header>
    <main>

        <div class="icone">
            <img src="./img/icone-login.png" alt="icone-login">        
        </div>
        <div class="login-card">
            <h2>Bem-vindo de volta!</h2>
            <p>Insira suas credenciais para acessar o estoque</p>

            <form id="loginForm" class="card-form">
            <div class="input-group">
            <label for="username">Nome do Usuário</label>
            <input type="text" id="username" placeholder="Digite seu nome ..." required>
            </div>
        
            <div class="input-group">
            <label for="password">Senha</label>
            <input type="text" id="password" placeholder="Digite sua senha ..." required>
            </div>

            <div class="btn-acessar">
                <button type="submit" class="btn-login">Acessar</button>
            </div>
        </div>

    </main>
</body>
</html>
